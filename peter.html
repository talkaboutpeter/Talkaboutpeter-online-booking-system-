        <!--Navigation bar-->
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <img src="img/image.png" alt="logo" class="logo-img">
                    <a href="#">online booking system</a>
                </div>
                <ul class="nav-links">
                    <li><a href="peter.html">Home</a></li>

            <!--footer section-->
     <footer  class="footer">

     </footer>      


          <!-- Script for Slider -->
    <script>
        const slides = document.querySelector('.slides');
        let currentIndex = 0;

        setInterval(() => {
            currentIndex = (currentIndex + 1) % 3;
            slides.style.transform = `translateX(-${currentIndex * 100}%)`;
        }, 3000);
    </script>
    <script src="script.js"></script>
